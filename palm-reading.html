<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palm Reading — Astro Mala Singh</title>
    <meta name="description" content="AI-powered palm reading. Upload left & right palm photos for love, career, wealth, health insights & remedies.">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <canvas id="galaxy-canvas" aria-hidden="true"></canvas>
    <div class="site-wrap">
        <div id="site-header"></div>
        <main>
            <div class="page-hero">
                <div class="container">
                    <h1>🖐 Palm Reading</h1>
                    <p>Upload your palms for AI-powered spiritual analysis</p>
                </div>
            </div>
            <section class="section">
                <div class="container">
                    <div class="grid-2 reveal">
                        <div class="glass glass-card">
                            <h3 style="color:var(--gold);font-family:var(--font-heading);margin-bottom:16px;">Upload Left Palm</h3>
                            <label class="upload-zone">
                                <input type="file" accept="image/*" capture="environment">
                                <p class="upload-label">📷 Click or drag left palm photo</p>
                                <img class="upload-preview" alt="" style="display:none;max-height:160px;margin:12px auto 0;border-radius:12px;">
                            </label>
                        </div>
                        <div class="glass glass-card">
                            <h3 style="color:var(--gold);font-family:var(--font-heading);margin-bottom:16px;">Upload Right Palm</h3>
                            <label class="upload-zone">
                                <input type="file" accept="image/*" capture="environment">
                                <p class="upload-label">📷 Click or drag right palm photo</p>
                                <img class="upload-preview" alt="" style="display:none;max-height:160px;margin:12px auto 0;border-radius:12px;">
                            </label>
                        </div>
                    </div>
                    <div class="glass glass-card reveal" style="margin-top:24px;">
                        <h3 style="color:var(--gold);font-family:var(--font-heading);margin-bottom:12px;">You Will Receive</h3>
                        <ul class="tag-list">
                            <li>Love</li><li>Marriage</li><li>Career</li><li>Wealth</li><li>Health</li>
                            <li>Personality</li><li>Lucky Number</li><li>Lucky Color</li><li>Lucky Days</li><li>Remedies</li>
                        </ul>
                        <a href="ai-chat.html" class="btn btn-gold" style="margin-top:20px;">Analyze My Palms — Free Start</a>
                    </div>
                </div>
            </section>
        </main>
        <div id="site-footer"></div>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
