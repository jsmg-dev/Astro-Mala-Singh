<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Astro Mala Singh</title>
    <meta name="description" content="Contact Astro Mala Singh via WhatsApp, email or contact form.">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <canvas id="galaxy-canvas" aria-hidden="true"></canvas>
    <div class="site-wrap">
        <div id="site-header"></div>
        <main>
            <div class="page-hero">
                <div class="container">
                    <h1>Contact Us</h1>
                    <p>We respond within 24 hours</p>
                </div>
            </div>
            <section class="section">
                <div class="container">
                    <div class="grid-2">
                        <div class="glass glass-card reveal">
                            <h3 style="color:var(--gold);font-family:var(--font-heading);margin-bottom:16px;">Get in Touch</h3>
                            <p style="color:var(--muted);margin-bottom:12px;"><strong>WhatsApp:</strong> +91 9166010400</p>
                            <p style="color:var(--muted);margin-bottom:12px;"><strong>Email:</strong> contact@sbbf.in</p>
                            <p style="color:var(--muted);margin-bottom:20px;"><strong>Location:</strong> 3A, Rajbhawan Road, Rajasthan, India</p>
                            <div class="cta-row">
                                <a href="https://wa.me/919166010400" class="btn btn-gold" target="_blank" rel="noreferrer">WhatsApp</a>
                                <a href="mailto:contact@sbbf.in" class="btn btn-outline">Email</a>
                            </div>
                        </div>
                        <form class="glass glass-card reveal" onsubmit="event.preventDefault();alert('Thank you! We will respond soon.');">
                            <div class="form-group">
                                <label>Full Name</label>
                                <input type="text" required placeholder="Your name">
                            </div>
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" required placeholder="you@email.com">
                            </div>
                            <div class="form-group">
                                <label>Phone</label>
                                <input type="tel" placeholder="+91...">
                            </div>
                            <div class="form-group">
                                <label>Query Type</label>
                                <select>
                                    <option>General Inquiry</option>
                                    <option>Palm Reading</option>
                                    <option>Face Reading</option>
                                    <option>Psychic Reading</option>
                                    <option>Premium Consultation</option>
                                    <option>Partnership</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Message</label>
                                <textarea rows="4" required placeholder="How can we help?"></textarea>
                            </div>
                            <button type="submit" class="btn btn-glow" style="width:100%;">Send Message</button>
                        </form>
                    </div>
                </div>
            </section>
        </main>
        <div id="site-footer"></div>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
